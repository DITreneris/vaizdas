# GitHub Pages deploy – DI Vaizdo Generatorius (statinė HTML)
# Reikalavimas: Repo Settings → Pages → Build and deployment: GitHub Actions
# Jei deploy 404: https://github.com/DITreneris/vaizdas/settings/pages → Source: GitHub Actions
# Nuoroda: https://github.com/DITreneris/spinoff01 (QA standartas)

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      BASE_PATH: /${{ github.event.repository.name }}
      SITE_ORIGIN: https://${{ github.repository_owner }}.github.io
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm install
      - run: npm test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      BASE_PATH: /${{ github.event.repository.name }}
      SITE_ORIGIN: https://${{ github.repository_owner }}.github.io
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm install
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deploy
        uses: actions/deploy-pages@v4
