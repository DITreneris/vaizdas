name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CI: true
      BASE_PATH: /${{ github.event.repository.name }}
      SITE_ORIGIN: https://${{ github.repository_owner }}.github.io
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run tests (structure + lint)
        run: npm test

      - name: Accessibility check (pa11y)
        run: |
          npx serve -s . -l 3000 &
          npx wait-on -t 60000 http://127.0.0.1:3000/
          npx pa11y http://127.0.0.1:3000/ --config .pa11yrc.json
          npx pa11y http://127.0.0.1:3000/lt/ --config .pa11yrc.json
          npx pa11y http://127.0.0.1:3000/en/ --config .pa11yrc.json
          npx pa11y http://127.0.0.1:3000/privatumas.html --config .pa11yrc.json
          npx pa11y http://127.0.0.1:3000/lt/privatumas.html --config .pa11yrc.json
          npx pa11y http://127.0.0.1:3000/en/privacy.html --config .pa11yrc.json
